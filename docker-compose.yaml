services:
  # PostgreSQL for Lakekeeper catalog store
  db:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5432 -d postgres"]
      interval: 2s
      timeout: 10s
      retries: 5
      start_period: 10s
    volumes:
      - pg-data:/var/lib/postgresql/data

  # Lakekeeper DB migration
  migrate:
    image: &lk-image quay.io/lakekeeper/catalog:latest-main
    environment: &lk-env
      LAKEKEEPER__PG_ENCRYPTION_KEY: "demo-not-secure"
      LAKEKEEPER__PG_DATABASE_URL_READ: "postgresql://postgres:postgres@db:5432/postgres"
      LAKEKEEPER__PG_DATABASE_URL_WRITE: "postgresql://postgres:postgres@db:5432/postgres"
      LAKEKEEPER__AUTHZ_BACKEND: allowall
    command: ["migrate"]
    depends_on:
      db:
        condition: service_healthy

  # Lakekeeper — Iceberg REST Catalog (full read+write IRC)
  lakekeeper:
    image: *lk-image
    environment: *lk-env
    command: ["serve"]
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/home/nonroot/lakekeeper", "healthcheck"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 5s
    depends_on:
      migrate:
        condition: service_completed_successfully

  # S3-compatible storage for Iceberg data files
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin password;
      mc mb myminio/warehouse --ignore-existing;
      mc anonymous set public myminio/warehouse;
      "

  # Labels Proxy — enriches IRC responses with labels
  labels-proxy:
    build: ./labels-proxy
    ports:
      - "8182:8182"
    environment:
      UPSTREAM_CATALOG_URL: http://lakekeeper:8181
      LABELS_CONFIG_PATH: /app/labels_config.yaml
    depends_on:
      lakekeeper:
        condition: service_healthy
    restart: on-failure

  # ClickHouse — OLAP engine
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9009:9000"
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_PASSWORD: "demo"
    depends_on:
      - labels-proxy

  # Jupyter notebook
  notebook:
    image: quay.io/jupyter/scipy-notebook:python-3.12
    ports:
      - "8888:8888"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      JUPYTER_TOKEN: demo
    volumes:
      - ./notebook:/home/jovyan/work
    depends_on:
      - labels-proxy
      - clickhouse
    command: ["bash", "-c", "python3 /home/jovyan/work/install.py && start-notebook.py --NotebookApp.token=demo --ServerApp.root_dir=/home/jovyan/work"]

volumes:
  pg-data:
  minio-data:
